baseURL = 'https://pointnline.github.io/jaykko-blog/'
languageCode = 'ko'
title = '제이꼬 — AI × Finance × Edge'
theme = 'hugo-theme-stack'
paginate = 10

# Google Analytics 4
[services.googleAnalytics]
  ID = 'G-YDZGVF8SF0'

[privacy.googleAnalytics]
  disable = false
  respectDoNotTrack = false

[params]
  mainSections = ['posts']
  description = 'AI와 금융의 교차점에서 엣지를 찾는 기록'
  [params.colorScheme]
    default = 'dark'
    toggle = true
  # 구글 애드센스 Publisher ID (심사 승인 후 입력)
  # adsensePublisherId = "ca-pub-XXXXXXXXXXXXXXXX"
  
  [params.sidebar]
    emoji = '🌈'
    subtitle = 'AI × Finance × Real Estate'
  
  [params.footer]
    since = 2026

  [params.article]
    math = false
    toc = true
    readingTime = true

[menu]
  [[menu.main]]
    identifier = 'home'
    name = 'Home'
    url = '/'
    weight = 1
  [[menu.main]]
    identifier = 'energy'
    name = '⚡ 에너지'
    url = '/categories/에너지'
    weight = 2
  [[menu.main]]
    identifier = 'realestate'
    name = '🏢 부동산'
    url = '/categories/부동산'
    weight = 3
  [[menu.main]]
    identifier = 'business'
    name = '💼 비즈니스'
    url = '/categories/비즈니스'
    weight = 4
  [[menu.main]]
    identifier = 'stocks'
    name = '📈 주식'
    url = '/categories/주식'
    weight = 5
  [[menu.main]]
    identifier = 'archives'
    name = '📚 Archives'
    url = '/archives'
    weight = 6

[markup]
  [markup.highlight]
    style = 'dracula'
  [markup.goldmark.renderer]
    unsafe = true

[minify]
  [minify.tdewolff]
    [minify.tdewolff.html]
      keepEndTags = true
      keepWhitespace = true
